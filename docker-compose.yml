services:
  postgres:
    image: postgres:17
    profiles: ["local-db"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-svgmaker_proxy}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/svgmaker_proxy}
      SVGM_PROXY_HOST: 0.0.0.0
      SVGM_PROXY_PORT: ${SVGM_PROXY_PORT:-8000}
      SVGM_PROXY_MCP_PATH: ${SVGM_PROXY_MCP_PATH:-/mcp}
    ports:
      - "${SVGM_PROXY_PORT:-8000}:${SVGM_PROXY_PORT:-8000}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; port = os.environ.get('SVGM_PROXY_PORT', '8000'); urllib.request.urlopen(f'http://127.0.0.1:{port}/health')\" >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
